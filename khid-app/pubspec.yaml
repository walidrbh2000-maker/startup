name: khidmeti
description: Application moderne de services à domicile

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  # يفضل تحديث نسخة الفلاتر لتتوافق مع المكتبات الحديثة
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  
  # --- UI & Design
  
 
  flutter_animate: ^4.5.2


  # --- Firebase ---
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4


  firebase_messaging: ^16.1.1
  firebase_analytics: ^12.1.3

  # --- Utilities & Services ---
  permission_handler: ^12.0.1
  device_info_plus: ^11.3.0
  provider: ^6.1.5+1
  flutter_riverpod: ^2.6.1
  shimmer: ^3.0.0


  shared_preferences: ^2.5.3
  local_auth: ^2.3.0
  http: ^1.6.0
  http_parser: ^4.1.2
  path: ^1.9.1
  socket_io_client: ^3.1.4
  
  # --- Maps & Location ---
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  location: ^8.0.1
  firebase_remote_config: ^6.2.0

  # --- Media & Audio ---
  image_picker: ^1.2.0
  # Document picker (PDF + images) for worker/business verification docs —
  # image_picker cannot select PDFs.
  file_picker: ^8.1.4
  flutter_image_compress: ^2.4.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  record: ^6.2.0
  audioplayers: ^6.5.1
  camera: ^0.11.2
  
  # --- Notifications & Others ---
  cloud_functions: ^6.0.6
  flutter_local_notifications: ^19.5.0
  timeago: ^3.7.1
  flutter_native_splash: ^2.4.6
  go_router: ^16.1.0
  logger: ^2.6.2
  equatable: ^2.0.8
  video_compress: ^3.1.4
  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  


  speech_to_text: ^7.3.0


  google_sign_in: ^7.1.1

  flutter_facebook_auth: ^7.1.5

  sign_in_with_apple: ^6.1.1

  crypto: ^3.0.3
  flutter_svg: ^2.2.0
  lottie: ^3.3.1




dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


dependency_overrides:
  package_info_plus: ^8.1.2

flutter:
  uses-material-design: true
  
  assets:

    - assets/images/social/whatsapp.svg
    - assets/animations/
    
    
    