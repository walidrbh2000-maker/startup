name: khidmeti

# ══════════════════════════════════════════════════════════════════════════════
# KHIDMETI — docker-compose.gpu.yml v14.4 (PRODUCTION)
#
# ── USAGE ─────────────────────────────────────────────────────────────────────
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# ── CHANGEMENTS v14.4 vs v14.0 ────────────────────────────────────────────────
#
#   1. LLAMA_ARG_PARALLEL : 1 → 4
#      Raison : sur CPU (Codespaces) parallel=1 était obligatoire pour ne pas
#      saturer la RAM (8 GB). Sur GPU T4/A10G, le KV cache est en VRAM et
#      non en RAM système. Avec E2B Q4_K_M (~4.5 GB VRAM utilisé sur 16 GB),
#      parallel=4 réserve ~2.8 GB de KV cache supplémentaire → total ~7.3 GB
#      sur 16 GB VRAM (T4) → large marge. Résultat : 4 requêtes traitées
#      simultanément → ~120-180 requêtes AI/minute au lieu de ~4-6/minute.
#
#   2. LLAMA_ARG_FLASH_ATTN : ajouté (true)
#      Raison : Flash Attention n'est PAS supporté sur CPU (opération CUDA).
#      Il était absent du docker-compose.gpu.yml v14.0 pour cette raison.
#      Sur GPU T4/A10G, Flash Attention réduit la mémoire KV de ~30-40% et
#      accélère le prefill de ~20%. Permet d'augmenter parallel sans OOM.
#      IMPORTANT : ne jamais activer sur CPU (erreur llama.cpp au démarrage).
#
#   3. LLAMA_ARG_N_PREDICT : 512 → 128
#      Raison : le JSON de sortie de Khidmeti fait ~50 tokens max.
#      512 tokens max réservait de la mémoire inutilement et ralentissait
#      le circuit breaker (attente de fin de génération avant timeout).
#      128 tokens = marge x2.5 au-dessus du maximum réel observé.
#
#   4. mem_limit / mem_reservation sur ai-gemma4 : ajustés pour T4/A10G
#      T4 (16 GB VRAM) : model 4.5 GB + mmproj 1 GB + KV×4 ~2.8 GB = ~8.3 GB
#      A10G (24 GB VRAM) : même calcul → ~8.3 GB / 24 GB = 34% VRAM utilisée
#      mem_limit RAM système conservé à 2 GB (le modèle est en VRAM, pas RAM).
#
#   5. GEMMA4_TIMEOUT_MS référencé en commentaire
#      La valeur est dans .env — sur GPU 20 000 ms suffisent largement.
#      (GPU T4 répond en ~1-3s pour le texte, ~5-8s pour l'audio/image)
#
# ── INSTANCES AWS RECOMMANDÉES ────────────────────────────────────────────────
#
#   g4dn.xlarge  : T4 16 GB VRAM, 4 vCPUs, 16 GB RAM  → $0.526/h (~$380/mois)
#                  → parallel=4, FLASH_ATTN=true, ~120 req AI/min
#                  → RECOMMANDÉ pour 0-1 000 utilisateurs actifs
#
#   g4dn.2xlarge : T4 16 GB VRAM, 8 vCPUs, 32 GB RAM  → $0.752/h (~$541/mois)
#                  → parallel=4, backend NestJS + MongoDB plus à l'aise
#                  → RECOMMANDÉ pour 1 000-5 000 utilisateurs actifs
#
#   g5.xlarge    : A10G 24 GB VRAM, 4 vCPUs, 16 GB RAM → $1.006/h (~$724/mois)
#                  → parallel=6, ~180 req AI/min, réponse ~0.5s
#                  → RECOMMANDÉ pour 5 000-10 000 utilisateurs actifs
#
#   g5.2xlarge   : A10G 24 GB VRAM, 8 vCPUs, 32 GB RAM → $1.212/h (~$873/mois)
#                  → parallèle backend + GPU optimal, réponse ~0.5s
#                  → RECOMMANDÉ pour 10 000+ utilisateurs actifs
#
#   Reserved 1 an : économie ~40% → g4dn.xlarge ~$230/mois, g5.xlarge ~$435/mois
#
# ── RÉGION AWS RECOMMANDÉE ────────────────────────────────────────────────────
#   eu-west-3 (Paris) ou eu-south-1 (Milan) — latence ~30-50ms depuis Algérie
#   (vs ~120ms depuis us-east-1)
#
# ── E2B vs E4B — DÉCISION FINALE ─────────────────────────────────────────────
#   E2B Q4_K_M : 4.5 GB VRAM — SUFFISANT pour Khidmeti (intent extraction JSON)
#   E4B Q4_K_M : 6.1 GB VRAM — qualité +15-20% mais vitesse -30%
#   → CONSERVER E2B sur toutes les instances (même A10G).
#   → Passer à E4B uniquement si l'analyse d'images devient plus complexe
#     (ex: lecture de texte sur étiquette, analyse de documents).
#
# ── BUDGET VRAM (g4dn.xlarge — T4 16 GB) ────────────────────────────────────
#   E2B Q4_K_M model   : ~4.46 GB
#   mmproj BF16        : ~1.00 GB
#   KV cache ×4 (8192) : ~2.80 GB  (parallel=4 × 0.70 GB par slot)
#   CUDA overhead      : ~0.50 GB
#   ─────────────────────────────
#   Total VRAM         : ~8.76 GB  →  marge ~7.2 GB sur T4 ✅
#
# ── BUDGET VRAM (g5.xlarge — A10G 24 GB) ────────────────────────────────────
#   E2B Q4_K_M model   : ~4.46 GB
#   mmproj BF16        : ~1.00 GB
#   KV cache ×6 (8192) : ~4.20 GB  (parallel=6 × 0.70 GB par slot)
#   CUDA overhead      : ~0.50 GB
#   ─────────────────────────────
#   Total VRAM         : ~10.16 GB  →  marge ~13.8 GB sur A10G ✅
#
# ── PRÉREQUIS ─────────────────────────────────────────────────────────────────
#   NVIDIA drivers + Container Toolkit sur l'instance AWS :
#     sudo apt install nvidia-container-toolkit
#     sudo systemctl restart docker
#   Modèles téléchargés (inchangé) :
#     make download-gemma4  (GEMMA4_VARIANT=e2b par défaut)
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ══════════════════════════════════════════════════════════════════════════
  # AI-GEMMA4 — llama.cpp GPU (CUDA)
  #
  # MODÈLE : E2B Q4_K_M (inchangé vs CPU — même fichier GGUF)
  #   Fichiers dans docker/models/gemma4/ :
  #     google_gemma-4-e2b-it-Q4_K_M.gguf       (~3.46 GB sur disque)
  #     mmproj-google_gemma-4-e2b-it-bf16.gguf   (~1.00 GB sur disque)
  #
  # DIFFÉRENCES vs docker-compose.yml (CPU) :
  #   LLAMA_ARG_PARALLEL     : 1 → 4   (GPU peut gérer plusieurs requêtes)
  #   LLAMA_ARG_FLASH_ATTN   : absent → true (CUDA uniquement)
  #   LLAMA_ARG_N_GPU_LAYERS : absent → 999  (full offload VRAM)
  #   LLAMA_ARG_N_PREDICT    : 512 → 128     (JSON court, économie VRAM)
  #   mem_limit              : 5500m → 2g    (modèle en VRAM, pas RAM système)
  #
  # POUR g5.xlarge/g5.2xlarge (A10G 24 GB) :
  #   Changer LLAMA_ARG_PARALLEL à "6" pour utiliser la VRAM supplémentaire
  #   → ~180 requêtes AI/minute au lieu de ~120
  # ══════════════════════════════════════════════════════════════════════════
  ai-gemma4:
    environment:
      # ── Modèles (inchangés vs CPU) ──────────────────────────────────────
      LLAMA_ARG_MODEL:   "/models/${GEMMA4_MODEL_FILE:-google_gemma-4-e2b-it-Q4_K_M.gguf}"
      LLAMA_ARG_MMPROJ:  "/models/${GEMMA4_MMPROJ_FILE:-mmproj-google_gemma-4-e2b-it-bf16.gguf}"
      LLAMA_ARG_HF_TOKEN: "${HF_TOKEN}"

      # ── Réseau ──────────────────────────────────────────────────────────
      LLAMA_ARG_PORT: "8011"
      LLAMA_ARG_HOST: "0.0.0.0"

      # ── Contexte ────────────────────────────────────────────────────────
      LLAMA_ARG_CTX_SIZE: "${GEMMA4_CTX_SIZE:-8192}"

      # ── NOUVEAU v14.4 : tokens max réduits à 128 (JSON ~50 tokens max) ─
      # CPU utilisait 512 → gaspillage mémoire et temps.
      # Sur GPU, réduire N_PREDICT libère de la VRAM pour plus de parallel.
      LLAMA_ARG_N_PREDICT: "128"

      # ── CPU threads (pour les layers non-GPU éventuels) ─────────────────
      # g4dn.xlarge : 4 vCPUs → threads=4 optimal
      # g4dn.2xlarge : 8 vCPUs → changer à "8"
      # g5.xlarge    : 4 vCPUs → threads=4 optimal
      # g5.2xlarge   : 8 vCPUs → changer à "8"
      LLAMA_ARG_THREADS: "4"

      # ── NOUVEAU v14.4 : parallel=4 (était 1 sur CPU) ─────────────────
      # 4 requêtes traitées simultanément sur T4/A10G.
      # Changer à "6" sur g5.xlarge/g5.2xlarge (A10G 24 GB).
      LLAMA_ARG_PARALLEL: "4"

      # ── Optimisations GPU ────────────────────────────────────────────
      LLAMA_ARG_CONT_BATCHING: "true"   # batching continu (inchangé)
      LLAMA_ARG_JINJA:         "true"   # template Gemma4 (inchangé)

      # ── NOUVEAU v14.4 : full GPU offload ─────────────────────────────
      # Charge TOUS les layers en VRAM (999 = infini = tout).
      # E2B a ~18 layers → 999 garantit que rien ne reste sur CPU.
      # RÉSULTAT : ~10-20x plus rapide qu'en CPU-only.
      LLAMA_ARG_N_GPU_LAYERS: "999"

      # ── NOUVEAU v14.4 : Flash Attention (GPU uniquement) ─────────────
      # Réduit l'utilisation VRAM du KV cache de ~30-40%.
      # Accélère le prefill (traitement du prompt) de ~20%.
      # NE PAS activer sur CPU → erreur llama.cpp au démarrage.
      LLAMA_ARG_FLASH_ATTN: "true"

      # ── Variables CUDA (NVIDIA Container Toolkit) ─────────────────────
      NVIDIA_VISIBLE_DEVICES:     "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

    # ── Limites mémoire RAM système ──────────────────────────────────────
    # Sur GPU, le modèle (~4.5 GB) est en VRAM — pas en RAM système.
    # La RAM système est utilisée uniquement par llama.cpp process + OS.
    # 2 GB RAM suffisent (vs 5500m sur CPU qui devait loger le modèle).
    mem_limit:       2g
    mem_reservation: 512m

    # ── Ressources GPU (NVIDIA Container Toolkit requis) ─────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver:       nvidia
              count:        all          # utilise tous les GPU disponibles
              capabilities: [gpu]

  # ══════════════════════════════════════════════════════════════════════════
  # API NestJS — limites levées sur instance GPU (RAM >= 16 GB)
  #
  # g4dn.xlarge : 16 GB RAM → NestJS peut utiliser jusqu'à 2 GB confortablement
  # g4dn.2xlarge : 32 GB RAM → NestJS peut utiliser jusqu'à 4 GB
  #
  # NODE_OPTIONS --max-old-space-size conservé à 768 MB (suffisant pour NestJS)
  # La limite docker est levée (null) pour laisser l'OS gérer.
  # ══════════════════════════════════════════════════════════════════════════
  api:
    mem_limit:       null
    mem_reservation: null

  # ══════════════════════════════════════════════════════════════════════════
  # SERVICES INFRASTRUCTURE — limites levées sur instance GPU
  #
  # Sur Codespaces (8 GB RAM total), les limites strictes évitaient l'OOM.
  # Sur AWS g4dn.xlarge (16 GB RAM) ou g5 (16-32 GB RAM), les limites
  # peuvent être levées — MongoDB, Redis, Qdrant, MinIO ont plus de marge.
  #
  # Note : Redis conserve maxmemory=512mb (politique LRU) pour éviter
  # une croissance non contrôlée du cache même avec plus de RAM disponible.
  # ══════════════════════════════════════════════════════════════════════════
  mongo:
    mem_limit:       null
    mem_reservation: null

  redis:
    mem_limit:       null
    mem_reservation: null
    # maxmemory 512mb conservé intentionnellement (voir note ci-dessus)
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  qdrant:
    mem_limit:       null
    mem_reservation: null

  minio:
    mem_limit:       null
    mem_reservation: null

  mongo-express:
    mem_limit:       null
    mem_reservation: null

  nginx:
    mem_limit:       null
    mem_reservation: null
